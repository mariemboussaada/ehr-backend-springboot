<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Médecin</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 0 auto; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .forgot-password { text-align: right; margin-top: 10px; }
        .forgot-password a { color: #2196F3; text-decoration: none; }
        #resetPasswordForm { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Connexion Médecin</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Mot de passe" required>
        <button type="button" onclick="login()">Se Connecter</button>
        <div class="forgot-password">
            <a href="#" onclick="showResetPassword()">Mot de passe oublié ?</a>
        </div>
    </form>

    <form id="resetPasswordForm">
        <h3>Réinitialisation du mot de passe</h3>
        <input type="email" id="resetEmail" placeholder="Email">
        <button type="button" onclick="initiateReset()">Envoyer le code</button>

        <div id="resetVerificationSection" style="display:none;">
            <input type="text" id="resetCode" placeholder="Code de vérification">
            <input type="password" id="newPassword" placeholder="Nouveau mot de passe">
            <button type="button" onclick="completeReset()">Réinitialiser</button>
        </div>
        <button type="button" onclick="showLoginForm()">Retour à la connexion</button>
    </form>
</div>

<script>
    function login() {
        const data = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        fetch('http://localhost:1234/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(response => response.json())
            .then(data => {
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/chat';
                } else {
                    alert(data.error || 'Erreur de connexion');
                }
            })
            .catch(error => alert(error.message));
    }

    function showResetPassword() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('resetPasswordForm').style.display = 'block';
    }

    function showLoginForm() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('resetPasswordForm').style.display = 'none';
    }

    function initiateReset() {
        const email = document.getElementById('resetEmail').value;
        fetch(`http://localhost:1234/api/auth/reset-password/init?email=${email}`, {
            method: 'POST'
        })
            .then(response => {
                if (response.ok) {
                    document.getElementById('resetVerificationSection').style.display = 'block';
                    alert('Code de réinitialisation envoyé !');
                } else {
                    throw new Error('Erreur lors de la réinitialisation');
                }
            })
            .catch(error => alert(error.message));
    }

    function completeReset() {
        const data = {
            email: document.getElementById('resetEmail').value,
            code: document.getElementById('resetCode').value,
            newPassword: document.getElementById('newPassword').value
        };

        fetch('http://localhost:1234/api/auth/reset-password/complete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(text);
                    });
                }
                return response.text();
            })
            .then(result => {
                alert('Mot de passe réinitialisé avec succès !');
                showLoginForm();
            })
            .catch(error => {
                alert(error.message || 'Erreur lors de la réinitialisation');
            });
    }
</script>
</body>
</html>
